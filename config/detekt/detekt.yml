config:
  validation: true
  warningsAsErrors: false
  checkExhaustiveness: false

processors:
  active: true

console-reports:
  active: true

complexity:
  active: true
  CognitiveComplexMethod:
    active: true
    allowedComplexity: 15
  ComplexCondition:
    active: true
    allowedConditions: 4
  CyclomaticComplexMethod:
    active: true
    allowedComplexity: 12
  LargeClass:
    active: true
    allowedLines: 250
  LongMethod:
    active: true
    allowedLines: 70
  LongParameterList:
    active: true
    allowedFunctionParameters: 7
    allowedConstructorParameters: 8
    ignoreDefaultParameters: true
  TooManyFunctions:
    active: true
    allowedFunctionsPerFile: 14
    allowedFunctionsPerClass: 14
    allowedFunctionsPerInterface: 12
    allowedFunctionsPerObject: 14
    allowedFunctionsPerEnum: 10
    ignoreDeprecated: true
    ignorePrivate: true
    ignoreOverridden: true

coroutines:
  active: true
  GlobalCoroutineUsage:
    active: true
  InjectDispatcher:
    active: true
  RedundantSuspendModifier:
    active: true
  SleepInsteadOfDelay:
    active: true
  SuspendFunSwallowedCancellation:
    active: true

exceptions:
  active: true
  SwallowedException:
    active: true
  TooGenericExceptionCaught:
    active: true
    exceptionNames:
      - Error
      - Exception
      - Throwable
  TooGenericExceptionThrown:
    active: true

naming:
  active: true
  FunctionNaming:
    active: true
    functionPattern: '[a-z][a-zA-Z0-9]*'
    ignoreAnnotated:
      - Composable
  TopLevelPropertyNaming:
    active: true
    constantPattern: '[A-Z][_A-Z0-9]*'
    propertyPattern: '[A-Za-z][_A-Za-z0-9]*'

style:
  active: true
  ForbiddenComment:
    active: true
    comments:
      - TODO:
      - FIXME:
      - STOPSHIP:
    allowedPatterns: ''
  MagicNumber:
    active: false
  MaxLineLength:
    active: true
    maxLineLength: 100
    excludePackageStatements: true
    excludeImportStatements: true
    excludeCommentStatements: false
  NewLineAtEndOfFile:
    active: true
  ReturnCount:
    active: true
    max: 3
    excludedFunctions:
      - equals
  ThrowsCount:
    active: true
    max: 2
  AbstractClassCanBeConcreteClass:
    active: true
  AbstractClassCanBeInterface:
    active: true
  UnusedPrivateClass:
    active: true
    ignoreAnnotated:
      - Preview
      - Composable
  UnusedPrivateFunction:
    active: true
    ignoreAnnotated:
      - Preview
      - Composable
  UnusedPrivateProperty:
    active: true
    ignoreAnnotated:
      - Preview
      - Composable
